binary_sensor:
  - platform: template
    name: "01. Presence"
    id: presence_combined
    device_class: occupancy
    lambda: |-
      return id(state_presence_stable);

  - platform: template
    name: "02. Motion"
    id: motion_combined
    device_class: motion
    lambda: |-
      return id(state_motion_stable);

  - platform: template
    name: "03. Moving Target"
    id: moving_target_filtered
    device_class: motion
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled() &&
          !id(target_1_filter_blocked) && !id(target_2_filter_blocked) && !id(target_3_filter_blocked)) {
        return id(radar_api).tracker_output().moving_track_count > 0;
      }
      return
        (id(target_1_direction_raw).state != "NA" && !id(target_1_filtered) && id(target_1_range_valid) && fabsf(id(target_1_speed_raw).state) > id(dir_stationary_speed)) ||
        (id(target_2_direction_raw).state != "NA" && !id(target_2_filtered) && id(target_2_range_valid) && fabsf(id(target_2_speed_raw).state) > id(dir_stationary_speed)) ||
        (id(target_3_direction_raw).state != "NA" && !id(target_3_filtered) && id(target_3_range_valid) && fabsf(id(target_3_speed_raw).state) > id(dir_stationary_speed));
    filters:
      - delayed_off: 1s

  - platform: template
    name: "04. Stationary Target"
    id: still_target_filtered
    device_class: occupancy
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled() &&
          !id(target_1_filter_blocked) && !id(target_2_filter_blocked) && !id(target_3_filter_blocked)) {
        return id(radar_api).tracker_output().still_track_count > 0;
      }
      return
        (id(target_1_direction_raw).state != "NA" && !id(target_1_filtered) && id(target_1_range_valid) && fabsf(id(target_1_speed_raw).state) <= id(dir_stationary_speed)) ||
        (id(target_2_direction_raw).state != "NA" && !id(target_2_filtered) && id(target_2_range_valid) && fabsf(id(target_2_speed_raw).state) <= id(dir_stationary_speed)) ||
        (id(target_3_direction_raw).state != "NA" && !id(target_3_filtered) && id(target_3_range_valid) && fabsf(id(target_3_speed_raw).state) <= id(dir_stationary_speed));
    filters:
      - delayed_off: 1s

  - platform: template
    name: "09. Zone 1 Presence"
    id: software_zone_1_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_1_presence_state);
    filters:
      - delayed_off: 1s

  - platform: template
    name: "10. Zone 2 Presence"
    id: software_zone_2_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_2_presence_state);
    filters:
      - delayed_off: 1s

  - platform: template
    name: "11. Zone 3 Presence"
    id: software_zone_3_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_3_presence_state);
    filters:
      - delayed_off: 1s

  - platform: template
    name: "12. Zone 4 Presence"
    id: software_zone_4_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_4_presence_state);
    filters:
      - delayed_off: 1s

  - platform: template
    name: "13. Zone 5 Presence"
    id: software_zone_5_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_5_presence_state);
    filters:
      - delayed_off: 1s

  - platform: template
    name: "14. Zone 6 Presence"
    id: software_zone_6_presence
    device_class: occupancy
    lambda: |-
      return id(software_zone_6_presence_state);
    filters:
      - delayed_off: 1s

sensor:
  - platform: template
    name: "05. Target Count"
    id: target_count_stable
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        if (id(target_1_filter_blocked) || id(target_2_filter_blocked) || id(target_3_filter_blocked)) return 0;
        const auto &tracker = id(radar_api).tracker_output();
        return tracker.confirmed_track_count + tracker.coasting_track_count;
      }
      return id(cnt_stable_total);

  - platform: template
    name: "06. Temperature"
    id: temperature_corrected
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      const float raw = id(temperature_raw).state;
      if (isnan(raw)) {
        return {};
      }
      if (!id(environment_correction_enable_switch).state) {
        return raw;
      }
      return 0.95f * raw + 0.42f + id(temperature_user_offset).state;

  - platform: template
    name: "07. Humidity"
    id: humidity_corrected
    device_class: humidity
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      const float raw = id(humidity_raw).state;
      if (isnan(raw)) {
        return {};
      }
      if (!id(environment_correction_enable_switch).state) {
        return raw;
      }
      const float corrected = raw + id(humidity_user_offset).state;
      if (corrected < 0.0f) {
        return 0.0f;
      }
      if (corrected > 100.0f) {
        return 100.0f;
      }
      return corrected;

  - platform: bh1750
    name: "08. Illuminance"
    id: illuminance_lux
    address: 0x23
    update_interval: 5s
