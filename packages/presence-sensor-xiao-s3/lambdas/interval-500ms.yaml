|-
  const uint32_t now = millis();
  
  // === 섹션 1: 존/보정 설정 파싱 및 point-in-polygon 헬퍼 ===
  // radar_api에 저장된 software/calibration zone JSON을 읽고, 타입 판정과 점 포함 여부를 계산한다.
  // 설정이 없거나 깨진 경우 각 헬퍼가 false/0을 반환하도록 설계되어 있으며, 조기 반환으로 전체 감지를 중단하지 않는다.
  // 직접 만든 문자열 파서는 임베디드 힙 사용을 낮추기 위한 경량 경로이므로 동작 보존이 중요하다.
  auto clamp_value = [](float value, float min_value, float max_value) -> float {
    if (value < min_value) return min_value;
    if (value > max_value) return max_value;
    return value;
  };
  
  auto zone_config_for = [&](int zone_index) -> std::string {
    const std::string cached = id(radar_api).software_zone_config(zone_index);
    if (!cached.empty()) return cached;
    return "";
  };
  
  auto calibration_config_for = [&](int zone_index) -> std::string {
    const std::string cached = id(radar_api).calibration_zone_config(zone_index);
    if (!cached.empty()) return cached;
    return "";
  };
  
  auto zone_config_valid = [&](const std::string &value, int zone_index) -> bool {
    std::string needle = std::string("\"id\":\"zone_") + std::to_string(zone_index) + "\"";
    return !value.empty() && value != "__EMPTY__" && value.find(needle) != std::string::npos && value.find("\"points\"") != std::string::npos;
  };
  
  auto calibration_config_valid = [&](const std::string &value, int zone_index) -> bool {
    std::string needle = std::string("\"id\":\"calibration_") + std::to_string(zone_index) + "\"";
    return !value.empty() && value != "__EMPTY__" && value.find(needle) != std::string::npos && value.find("\"points\"") != std::string::npos;
  };
  
  auto zone_type_is = [&](int zone_index, const char *type) -> bool {
    const std::string zone_config = zone_config_for(zone_index);
    if (!zone_config_valid(zone_config, zone_index)) return false;
    std::string needle = std::string("\"type\":\"") + type + "\"";
    return zone_config.find(needle) != std::string::npos;
  };
  
  auto point_in_zone_config = [&](const std::string &zone_config, float tx, float ty) -> bool {
    const size_t end = zone_config.size();
    size_t points_pos = zone_config.find("\"points\"");
    if (points_pos == std::string::npos || points_pos >= end) return false;
  
    float xs[8];
    float ys[8];
    int point_count = 0;
    size_t pos = zone_config.find('[', points_pos);
    if (pos == std::string::npos || pos >= end) return false;
  
    auto read_number = [&](size_t &cursor, float &value) -> bool {
      while (cursor < end && !(zone_config[cursor] == '-' || (zone_config[cursor] >= '0' && zone_config[cursor] <= '9'))) cursor++;
      if (cursor >= end) return false;
      const size_t number_start = cursor;
      if (zone_config[cursor] == '-') cursor++;
      while (cursor < end && zone_config[cursor] >= '0' && zone_config[cursor] <= '9') cursor++;
      value = atof(zone_config.substr(number_start, cursor - number_start).c_str());
      return true;
    };
  
    while (pos < end && point_count < 8) {
      float x = 0;
      float y = 0;
      if (!read_number(pos, x)) break;
      if (!read_number(pos, y)) break;
      xs[point_count] = clamp_value(x, -4860.0f, 4860.0f);
      ys[point_count] = clamp_value(y, 0.0f, 7560.0f);
      point_count++;
      size_t next = zone_config.find('[', pos);
      size_t zone_close = zone_config.find("]]", pos);
      if (next == std::string::npos || (zone_close != std::string::npos && zone_close < next) || next >= end) break;
      pos = next;
    }
  
    if (point_count < 3) return false;
    bool inside = false;
    for (int i = 0, j = point_count - 1; i < point_count; j = i++) {
      const bool intersects = ((ys[i] > ty) != (ys[j] > ty)) &&
        (tx < (xs[j] - xs[i]) * (ty - ys[i]) / ((ys[j] - ys[i]) == 0 ? 0.0001f : (ys[j] - ys[i])) + xs[i]);
      if (intersects) inside = !inside;
    }
    return inside;
  };
  
  auto point_in_software_zone = [&](int zone_index, float tx, float ty) -> bool {
    const std::string zone_config = zone_config_for(zone_index);
    if (!zone_config_valid(zone_config, zone_index)) return false;
    return point_in_zone_config(zone_config, tx, ty);
  };
  
  auto calibration_zone_type_is = [&](int zone_index, const char *type) -> bool {
    const std::string zone_config = calibration_config_for(zone_index);
    if (!calibration_config_valid(zone_config, zone_index)) return false;
    std::string needle = std::string("\"type\":\"") + type + "\"";
    return zone_config.find(needle) != std::string::npos;
  };
  
  auto point_in_calibration_zone_type = [&](int zone_index, const char *type, float tx, float ty) -> bool {
    const std::string zone_config = calibration_config_for(zone_index);
    if (!calibration_config_valid(zone_config, zone_index)) return false;
    if (!calibration_zone_type_is(zone_index, type)) return false;
    return point_in_zone_config(zone_config, tx, ty);
  };
  
  auto point_in_any_calibration_zone_type = [&](const char *type, float tx, float ty) -> bool {
    for (int zone_index = 1; zone_index <= 4; zone_index++) {
      if (point_in_calibration_zone_type(zone_index, type, tx, ty)) return true;
    }
    return false;
  };
  
  auto calibration_zone_index_for_type = [&](const char *type, float tx, float ty) -> int {
    for (int zone_index = 1; zone_index <= 4; zone_index++) {
      if (point_in_calibration_zone_type(zone_index, type, tx, ty)) return zone_index;
    }
    return 0;
  };
  
  auto software_zone_contains = [&](int zone_index, float tx, float ty) -> bool {
    return point_in_software_zone(zone_index, tx, ty);
  };
  
  auto software_zone_type_is = [&](int zone_index, const char *type) -> bool {
    return zone_type_is(zone_index, type);
  };
  
  auto target_reduced_since = [&](int target_index) -> uint32_t {
    if (target_index == 1) return id(target_1_reduced_since_ms);
    if (target_index == 2) return id(target_2_reduced_since_ms);
    if (target_index == 3) return id(target_3_reduced_since_ms);
    return 0;
  };
  
  auto set_target_reduced_since = [&](int target_index, uint32_t value) {
    if (target_index == 1) id(target_1_reduced_since_ms) = value;
    if (target_index == 2) id(target_2_reduced_since_ms) = value;
    if (target_index == 3) id(target_3_reduced_since_ms) = value;
  };
  
  auto target_filter_mode = [&](int target_index, float tx, float ty) -> int {
    const int calibration_filter_zone = calibration_zone_index_for_type("filter", tx, ty);
    if (calibration_filter_zone > 0) {
      set_target_reduced_since(target_index, 0);
      return 10 + calibration_filter_zone;
    }
    for (int zone_index = 1; zone_index <= 6; zone_index++) {
      if (software_zone_type_is(zone_index, "filter") && software_zone_contains(zone_index, tx, ty)) {
        set_target_reduced_since(target_index, 0);
        return 2;
      }
    }
    const int calibration_reduced_zone = calibration_zone_index_for_type("reduced", tx, ty);
    if (calibration_reduced_zone > 0) {
      uint32_t since = target_reduced_since(target_index);
      if (since == 0) {
        since = now;
        set_target_reduced_since(target_index, since);
      }
      // 보정 reduced 존에서는 즉시 필터링하지 않고 일정 시간 버틴 뒤 통과시킨다.
      // PIR 움직임이 있으면 실제 움직임일 가능성이 높으므로 800ms, 없으면 2500ms를 요구한다.
      const uint32_t required_ms = id(pir_motion).state ? 800 : 2500;
      return (now - since) < required_ms ? 20 + calibration_reduced_zone : 0;
    }
    set_target_reduced_since(target_index, 0);
    return 0;
  };
  
  auto previous_calibration_filter_active = [&](int target_index) -> bool {
    if (target_index == 1) return id(target_1_calibration_filter_active);
    if (target_index == 2) return id(target_2_calibration_filter_active);
    if (target_index == 3) return id(target_3_calibration_filter_active);
    return false;
  };
  
  auto previous_calibration_reduced_active = [&](int target_index) -> bool {
    if (target_index == 1) return id(target_1_calibration_reduced_active);
    if (target_index == 2) return id(target_2_calibration_reduced_active);
    if (target_index == 3) return id(target_3_calibration_reduced_active);
    return false;
  };
  
  auto set_previous_calibration_filter_active = [&](int target_index, bool value) {
    if (target_index == 1) id(target_1_calibration_filter_active) = value;
    if (target_index == 2) id(target_2_calibration_filter_active) = value;
    if (target_index == 3) id(target_3_calibration_filter_active) = value;
  };
  
  auto set_previous_calibration_reduced_active = [&](int target_index, bool value) {
    if (target_index == 1) id(target_1_calibration_reduced_active) = value;
    if (target_index == 2) id(target_2_calibration_reduced_active) = value;
    if (target_index == 3) id(target_3_calibration_reduced_active) = value;
  };
  
  auto increment_calibration_filter_zone_hit = [&](int zone_index) {
    if (zone_index == 1) id(today_calibration_filter_zone_1_hits)++;
    if (zone_index == 2) id(today_calibration_filter_zone_2_hits)++;
    if (zone_index == 3) id(today_calibration_filter_zone_3_hits)++;
    if (zone_index == 4) id(today_calibration_filter_zone_4_hits)++;
  };
  
  auto increment_calibration_reduced_zone_hit = [&](int zone_index) {
    if (zone_index == 1) id(today_calibration_reduced_zone_1_hits)++;
    if (zone_index == 2) id(today_calibration_reduced_zone_2_hits)++;
    if (zone_index == 3) id(today_calibration_reduced_zone_3_hits)++;
    if (zone_index == 4) id(today_calibration_reduced_zone_4_hits)++;
  };
  
  auto previous_software_zone_mask = [&](int target_index) -> int {
    if (target_index == 1) return id(target_1_software_zone_mask);
    if (target_index == 2) return id(target_2_software_zone_mask);
    if (target_index == 3) return id(target_3_software_zone_mask);
    return 0;
  };
  
  auto set_previous_software_zone_mask = [&](int target_index, int mask) {
    if (target_index == 1) id(target_1_software_zone_mask) = mask;
    if (target_index == 2) id(target_2_software_zone_mask) = mask;
    if (target_index == 3) id(target_3_software_zone_mask) = mask;
  };
  
  auto increment_software_zone_hit = [&](int zone_index) {
    if (zone_index == 1) id(today_software_zone_1_hits)++;
    if (zone_index == 2) id(today_software_zone_2_hits)++;
    if (zone_index == 3) id(today_software_zone_3_hits)++;
    if (zone_index == 4) id(today_software_zone_4_hits)++;
    if (zone_index == 5) id(today_software_zone_5_hits)++;
    if (zone_index == 6) id(today_software_zone_6_hits)++;
  };
  
  // === 섹션 2: 필터/보정 모드 판정 및 존 진입 전이 통계 ===
  // 각 타깃이 software filter, calibration filter, calibration reduced 존에 걸리는지 계산한다.
  // 보정/소프트웨어 존의 hit 통계는 상태 전이를 기준으로 증가시켜 같은 존 체류 중 중복 집계를 피한다.
  auto record_software_zone_transitions = [&](int target_index, int current_mask) {
    // 존 안에 머무는 동안 중복 카운트를 막기 위해 새로 진입한 비트만 집계한다.
    // 이전 마스크에 없고 현재 마스크에 생긴 비트가 이번 프레임의 신규 진입이다.
    const int previous_mask = previous_software_zone_mask(target_index);
    const int entered_mask = current_mask & ~previous_mask;
    for (int zone_index = 1; zone_index <= 6; zone_index++) {
      const int bit = 1 << (zone_index - 1);
      if ((entered_mask & bit) != 0) increment_software_zone_hit(zone_index);
    }
    set_previous_software_zone_mask(target_index, current_mask);
  };
  
  auto record_calibration_transition = [&](int target_index, int mode) {
    const bool calibration_filter_active = mode >= 11 && mode <= 14;
    const bool calibration_reduced_active = mode >= 21 && mode <= 24;
    if (calibration_filter_active && !previous_calibration_filter_active(target_index)) {
      id(today_calibration_filter_hits)++;
      increment_calibration_filter_zone_hit(mode - 10);
    }
    if (calibration_reduced_active && !previous_calibration_reduced_active(target_index)) {
      id(today_calibration_reduced_hits)++;
      increment_calibration_reduced_zone_hit(mode - 20);
    }
    set_previous_calibration_filter_active(target_index, calibration_filter_active);
    set_previous_calibration_reduced_active(target_index, calibration_reduced_active);
  };

  auto record_heatmap_hit = [&](float tx, float ty) {
    id(radar_api).record_heatmap_hit(tx, ty);
  };
  
  const int target_1_filter_mode =
    id(target_1_direction_raw).state != "NA" ?
    target_filter_mode(1, id(target_1_x_raw).state, id(target_1_y_raw).state) : 0;
  const int target_2_filter_mode =
    id(target_2_direction_raw).state != "NA" ?
    target_filter_mode(2, id(target_2_x_raw).state, id(target_2_y_raw).state) : 0;
  const int target_3_filter_mode =
    id(target_3_direction_raw).state != "NA" ?
    target_filter_mode(3, id(target_3_x_raw).state, id(target_3_y_raw).state) : 0;
  
  record_calibration_transition(1, target_1_filter_mode);
  record_calibration_transition(2, target_2_filter_mode);
  record_calibration_transition(3, target_3_filter_mode);
  
  id(target_1_filtered) =
    id(target_1_direction_raw).state != "NA" &&
    target_1_filter_mode > 0;
  id(target_2_filtered) =
    id(target_2_direction_raw).state != "NA" &&
    target_2_filter_mode > 0;
  id(target_3_filtered) =
    id(target_3_direction_raw).state != "NA" &&
    target_3_filter_mode > 0;
  auto is_filter_blocked_mode = [](int mode) -> bool {
    return mode == 2 || (mode >= 11 && mode <= 14);
  };
  id(target_1_filter_blocked) =
    id(target_1_direction_raw).state != "NA" &&
    is_filter_blocked_mode(target_1_filter_mode);
  id(target_2_filter_blocked) =
    id(target_2_direction_raw).state != "NA" &&
    is_filter_blocked_mode(target_2_filter_mode);
  id(target_3_filter_blocked) =
    id(target_3_direction_raw).state != "NA" &&
    is_filter_blocked_mode(target_3_filter_mode);
  if (id(target_1_direction_raw).state == "NA") {
    id(target_1_reduced_since_ms) = 0;
    set_previous_calibration_filter_active(1, false);
    set_previous_calibration_reduced_active(1, false);
  }
  if (id(target_2_direction_raw).state == "NA") {
    id(target_2_reduced_since_ms) = 0;
    set_previous_calibration_filter_active(2, false);
    set_previous_calibration_reduced_active(2, false);
  }
  if (id(target_3_direction_raw).state == "NA") {
    id(target_3_reduced_since_ms) = 0;
    set_previous_calibration_filter_active(3, false);
    set_previous_calibration_reduced_active(3, false);
  }
  
  // === 섹션 3: presence/motion 안정화(디바운스) 상태 계산 ===
  // 필터링되지 않은 타깃과 PIR 상태를 조합해 프론트엔드/자동 제어용 재실 및 움직임 상태를 만든다.
  // PIR은 빠른 재실 안전망으로 filter block보다 우선한다. 움직임은 기존처럼 filter block에서 차단한다.
  const bool target1_raw_seen = id(target_1_direction_raw).state != "NA";
  const bool target2_raw_seen = id(target_2_direction_raw).state != "NA";
  const bool target3_raw_seen = id(target_3_direction_raw).state != "NA";
  const bool target1_seen = target1_raw_seen && !id(target_1_filtered);
  const bool target2_seen = target2_raw_seen && !id(target_2_filtered);
  const bool target3_seen = target3_raw_seen && !id(target_3_filtered);
  const float range_min_valid_mm = 100.0f;
  const float range_near_max_mm = 6000.0f;
  const float range_far_max_mm = 8000.0f;
  const uint32_t range_pir_entry_window_ms = 2500;
  const bool pir_now_for_range = id(pir_motion).state;
  if (pir_now_for_range && !id(range_pir_previous_state)) {
    id(range_pir_last_on_ms) = now;
  }
  id(range_pir_previous_state) = pir_now_for_range;
  const bool pir_recent_for_range =
    id(range_pir_last_on_ms) > 0 &&
    (now - id(range_pir_last_on_ms)) <= range_pir_entry_window_ms;
  id(diag_range_suspect_count) = 0;
  id(diag_range_out_of_range_count) = 0;
  id(diag_range_remote_candidate_count) = 0;
  id(diag_range_reason) = "ok";
  auto target_range_mm = [](float x, float y, float distance) -> float {
    if (!isnan(distance) && distance > 0.0f) return distance;
    if (isnan(x) || isnan(y)) return NAN;
    return sqrtf(x * x + y * y);
  };
  auto set_range_reason = [](const char *reason) {
    if (id(diag_range_reason) == "ok") id(diag_range_reason) = reason;
  };
  auto range_gate = [&](bool seen, float distance, bool &remote_suspect_latched) -> bool {
    if (!seen) {
      remote_suspect_latched = false;
      return false;
    }
    if (isnan(distance) || distance < range_min_valid_mm) {
      remote_suspect_latched = false;
      id(diag_range_suspect_count)++;
      set_range_reason("invalid_distance");
      return false;
    }
    if (distance <= range_near_max_mm) {
      remote_suspect_latched = false;
      return true;
    }
    if (distance > range_far_max_mm) {
      remote_suspect_latched = true;
      id(diag_range_out_of_range_count)++;
      set_range_reason("out_of_range");
      return false;
    }
    if (remote_suspect_latched) {
      id(diag_range_suspect_count)++;
      set_range_reason("remote_before_pir");
      return false;
    }
    if (pir_recent_for_range) {
      id(diag_range_remote_candidate_count)++;
      set_range_reason("remote_pir_validated");
      return true;
    }
    remote_suspect_latched = true;
    id(diag_range_suspect_count)++;
    set_range_reason("remote_without_pir");
    return false;
  };
  id(target_1_range_valid) = range_gate(target1_seen,
                                       target_range_mm(id(target_1_x_raw).state, id(target_1_y_raw).state, id(target_1_distance_raw).state),
                                       id(target_1_remote_suspect_latched));
  id(target_2_range_valid) = range_gate(target2_seen,
                                       target_range_mm(id(target_2_x_raw).state, id(target_2_y_raw).state, id(target_2_distance_raw).state),
                                       id(target_2_remote_suspect_latched));
  id(target_3_range_valid) = range_gate(target3_seen,
                                       target_range_mm(id(target_3_x_raw).state, id(target_3_y_raw).state, id(target_3_distance_raw).state),
                                       id(target_3_remote_suspect_latched));
  const bool target1_valid = target1_seen && id(target_1_range_valid);
  const bool target2_valid = target2_seen && id(target_2_range_valid);
  const bool target3_valid = target3_seen && id(target_3_range_valid);
  const int state_target_count = (target1_valid ? 1 : 0) + (target2_valid ? 1 : 0) + (target3_valid ? 1 : 0);
  const int state_moving_target_count =
    (target1_valid && fabsf(id(target_1_speed_raw).state) > id(dir_stationary_speed) ? 1 : 0) +
    (target2_valid && fabsf(id(target_2_speed_raw).state) > id(dir_stationary_speed) ? 1 : 0) +
    (target3_valid && fabsf(id(target_3_speed_raw).state) > id(dir_stationary_speed) ? 1 : 0);
  const int state_still_target_count = state_target_count - state_moving_target_count;
  const bool state_filter_blocked =
    id(target_1_filter_blocked) ||
    id(target_2_filter_blocked) ||
    id(target_3_filter_blocked);
  id(radar_api).update_presence_replay_raw_targets(
    target1_raw_seen, id(target_1_x_raw).state, id(target_1_y_raw).state,
    id(target_1_speed_raw).state, id(target_1_distance_raw).state,
    target_1_filter_mode, id(target_1_filtered), id(target_1_range_valid),
    target2_raw_seen, id(target_2_x_raw).state, id(target_2_y_raw).state,
    id(target_2_speed_raw).state, id(target_2_distance_raw).state,
    target_2_filter_mode, id(target_2_filtered), id(target_2_range_valid),
    target3_raw_seen, id(target_3_x_raw).state, id(target_3_y_raw).state,
    id(target_3_speed_raw).state, id(target_3_distance_raw).state,
    target_3_filter_mode, id(target_3_filtered), id(target_3_range_valid));
  const auto tracker_zone_evidence = id(radar_api).software_zone_evidence_for_targets(
    now,
    target1_valid, id(target_1_x_raw).state, id(target_1_y_raw).state,
    target2_valid, id(target_2_x_raw).state, id(target_2_y_raw).state,
    target3_valid, id(target_3_x_raw).state, id(target_3_y_raw).state);
  id(radar_api).update_presence_tracker(
    now, id(pir_motion).state, state_filter_blocked, tracker_zone_evidence.room_context_configured,
    id(illuminance_lux).state, id(dir_stationary_speed),
    target1_valid, id(target_1_x_raw).state, id(target_1_y_raw).state,
    id(target_1_speed_raw).state, id(target_1_distance_raw).state, tracker_zone_evidence.target_exit_masks[0],
    tracker_zone_evidence.target_room_inside[0], tracker_zone_evidence.target_room_outside[0],
    tracker_zone_evidence.target_room_signed_distances[0],
    target2_valid, id(target_2_x_raw).state, id(target_2_y_raw).state,
    id(target_2_speed_raw).state, id(target_2_distance_raw).state, tracker_zone_evidence.target_exit_masks[1],
    tracker_zone_evidence.target_room_inside[1], tracker_zone_evidence.target_room_outside[1],
    tracker_zone_evidence.target_room_signed_distances[1],
    target3_valid, id(target_3_x_raw).state, id(target_3_y_raw).state,
    id(target_3_speed_raw).state, id(target_3_distance_raw).state, tracker_zone_evidence.target_exit_masks[2],
    tracker_zone_evidence.target_room_inside[2], tracker_zone_evidence.target_room_outside[2],
    tracker_zone_evidence.target_room_signed_distances[2]);
  const auto &tracker_output = id(radar_api).tracker_output();
  const bool legacy_presence_fallback_enabled = id(radar_api).legacy_presence_fallback_enabled();
  const bool tracker_primary_enabled = !legacy_presence_fallback_enabled;
  const bool tracker_primary_available = tracker_primary_enabled && !state_filter_blocked;
  const int tracker_stable_track_count =
    tracker_output.confirmed_track_count + tracker_output.coasting_track_count;
  const int state_target_count_effective =
    tracker_primary_enabled ? (tracker_primary_available ? tracker_stable_track_count : 0) : state_target_count;
  const int state_moving_target_count_effective =
    tracker_primary_available ? tracker_output.moving_track_count : state_moving_target_count;
  const int state_still_target_count_effective =
    tracker_primary_available ? tracker_output.still_track_count : state_still_target_count;
  const bool effective_target1_valid =
    tracker_primary_enabled ? (tracker_primary_available && tracker_output.tracks[0].valid) : target1_valid;
  const bool effective_target2_valid =
    tracker_primary_enabled ? (tracker_primary_available && tracker_output.tracks[1].valid) : target2_valid;
  const bool effective_target3_valid =
    tracker_primary_enabled ? (tracker_primary_available && tracker_output.tracks[2].valid) : target3_valid;
  const float effective_target1_x = tracker_primary_enabled ? tracker_output.tracks[0].x_mm : id(target_1_x_raw).state;
  const float effective_target1_y = tracker_primary_enabled ? tracker_output.tracks[0].y_mm : id(target_1_y_raw).state;
  const float effective_target2_x = tracker_primary_enabled ? tracker_output.tracks[1].x_mm : id(target_2_x_raw).state;
  const float effective_target2_y = tracker_primary_enabled ? tracker_output.tracks[1].y_mm : id(target_2_y_raw).state;
  const float effective_target3_x = tracker_primary_enabled ? tracker_output.tracks[2].x_mm : id(target_3_x_raw).state;
  const float effective_target3_y = tracker_primary_enabled ? tracker_output.tracks[2].y_mm : id(target_3_y_raw).state;
  if (legacy_presence_fallback_enabled) {
    id(radar_api).update_legacy_presence(
      now, id(pir_motion).state, state_filter_blocked,
      state_target_count, state_moving_target_count, state_still_target_count, id(dir_stationary_speed),
      target1_valid, id(target_1_x_raw).state, id(target_1_y_raw).state, id(target_1_speed_raw).state,
      target2_valid, id(target_2_x_raw).state, id(target_2_y_raw).state, id(target_2_speed_raw).state,
      target3_valid, id(target_3_x_raw).state, id(target_3_y_raw).state, id(target_3_speed_raw).state);
  } else {
    id(radar_api).disable_legacy_presence();
  }
  const auto &legacy_presence = id(radar_api).legacy_presence_output();
  const bool state_still_hold_active = legacy_presence_fallback_enabled ? legacy_presence.still_hold_active : false;
  const bool state_presence_tracker_raw =
    id(pir_motion).state ? true :
    state_filter_blocked ? false :
    tracker_output.presence;
  const bool state_presence_raw =
    tracker_primary_enabled ? state_presence_tracker_raw : legacy_presence.presence;
  const bool state_motion_raw =
    tracker_primary_enabled ? (state_filter_blocked ? false : tracker_output.motion) :
    legacy_presence.motion;
  const char *state_presence_tracker_reason =
    id(pir_motion).state ? "pir" :
    state_filter_blocked ? "filter_blocked" :
    tracker_output.presence ? "tracker_primary" :
    "none";
  const char *state_presence_raw_reason =
    tracker_primary_enabled ? state_presence_tracker_reason : legacy_presence.presence_reason;
  const auto tracker_drop_reason_available = [](const char *value) -> bool {
    if (value == nullptr || value[0] == '\0') return false;
    return !(value[0] == 'n' && value[1] == 'o' && value[2] == 'n' && value[3] == 'e' && value[4] == '\0');
  };
  const char *state_tracker_off_reason =
    tracker_drop_reason_available(tracker_output.drop_reason) ? tracker_output.drop_reason : "tracker_lost_hold_expired";
  const char *state_motion_tracker_reason =
    state_filter_blocked ? "filter_blocked" :
    id(pir_motion).state ? "pir" :
    tracker_output.motion ? "tracker_motion" :
    "none";
  const char *state_motion_raw_reason =
    tracker_primary_enabled ? state_motion_tracker_reason : legacy_presence.motion_reason;
  if (legacy_presence_fallback_enabled) {
    id(diag_still_confidence) = legacy_presence.still_confidence;
    id(diag_still_anchor_valid) = legacy_presence.still_anchor_valid;
    id(diag_still_anchor_x) = legacy_presence.still_anchor_x;
    id(diag_still_anchor_y) = legacy_presence.still_anchor_y;
    id(diag_still_last_seen_ms) = legacy_presence.still_last_seen_ms;
    id(diag_still_confirmed) = legacy_presence.still_confirmed;
    id(diag_still_state) = legacy_presence.still_state;
    id(diag_still_reason) = legacy_presence.still_reason;
  } else {
    id(diag_still_confidence) = tracker_output.track_score;
    id(diag_still_anchor_valid) = tracker_output.active_track_count > 0;
    id(diag_still_anchor_x) = tracker_output.tracks[0].x_mm;
    id(diag_still_anchor_y) = tracker_output.tracks[0].y_mm;
    id(diag_still_last_seen_ms) = 0;
    id(diag_still_confirmed) = tracker_output.confirmed_track_count > 0;
    id(diag_still_state) = tracker_output.state;
    id(diag_still_reason) = tracker_output.reason;
  }
  if (state_target_count > 0) {
    id(diag_last_valid_target_ms) = now;
    id(diag_empty_samples_consecutive) = 0;
  } else if (id(diag_empty_samples_consecutive) < 1000000) {
    id(diag_empty_samples_consecutive)++;
  }
  const bool diag_presence_before = id(diag_presence_previous_stable);
  const bool diag_motion_before = id(diag_motion_previous_stable);
  // 존재 감지는 즉시 켜고 늦게 끈다(깜빡임 방지). presence 3s, motion 0.5s 홀드.
  // 이 비대칭은 의도된 것이며 사용자 체감 안정성을 위한 값이다.
  if (state_presence_raw) {
    id(state_presence_stable) = true;
    id(state_presence_last_on_ms) = now;
  } else if ((now - id(state_presence_last_on_ms)) >= 3000) {
    id(state_presence_stable) = false;
  }
  if (state_motion_raw) {
    id(state_motion_stable) = true;
    id(state_motion_last_on_ms) = now;
  } else if ((now - id(state_motion_last_on_ms)) >= 500) {
    id(state_motion_stable) = false;
  }
  if (id(state_presence_stable) != diag_presence_before) {
    if (id(state_presence_stable)) {
      const uint32_t drop_ms = id(diag_last_presence_change_ms) == 0 ? 0 : now - id(diag_last_presence_change_ms);
      id(diag_last_presence_drop_ms) = drop_ms;
      if (drop_ms > 0 && drop_ms <= 10000) {
        id(diag_short_presence_drop_count)++;
      } else if (drop_ms >= 60000) {
        id(diag_long_presence_drop_count)++;
      }
      id(diag_last_presence_reason) = state_presence_raw_reason;
    } else {
      id(diag_last_presence_off_reason) =
        state_filter_blocked ? "filter_blocked" :
        id(diag_still_reason) == "confidence_expired" ? "still_confidence_expired" :
        id(diag_still_reason) == "max_hold_expired" ? "still_max_hold_expired" :
        tracker_primary_enabled ? state_tracker_off_reason :
        state_target_count == 0 ? "target_lost_hold_expired" :
        "unknown";
      id(diag_last_presence_reason) = id(diag_last_presence_off_reason);
    }
    id(diag_last_presence_change_ms) = now;
  }
  if (id(state_motion_stable) != diag_motion_before) {
    id(diag_last_motion_reason) = id(state_motion_stable) ? state_motion_raw_reason : "motion_hold_expired";
    id(diag_last_motion_change_ms) = now;
  }
  id(diag_presence_previous_stable) = id(state_presence_stable);
  id(diag_motion_previous_stable) = id(state_motion_stable);
  const bool state_pir_motion_effective = id(pir_motion).state && !state_filter_blocked;
  // === 섹션 4: 프론트엔드용 state JSON 직렬화 ===
  // 현재 감지 상태, 타깃 좌표, 필터/보정 상태, 환경값을 웹 대시보드가 읽는 JSON으로 만든다.
  // 필드명과 구조는 프론트엔드가 의존하므로 순서와 의미를 보존해야 한다.
  const bool heatmap_record_due = id(heatmap_last_record_ms) == 0 || (now - id(heatmap_last_record_ms)) >= 5000;
  if (heatmap_record_due && (effective_target1_valid || effective_target2_valid || effective_target3_valid)) {
    if (effective_target1_valid) record_heatmap_hit(effective_target1_x, effective_target1_y);
    if (effective_target2_valid) record_heatmap_hit(effective_target2_x, effective_target2_y);
    if (effective_target3_valid) record_heatmap_hit(effective_target3_x, effective_target3_y);
    id(heatmap_last_record_ms) = now;
  }
  
  id(radar_api).update_software_zone_evidence(
    now,
    effective_target1_valid, effective_target1_x, effective_target1_y,
    effective_target2_valid, effective_target2_x, effective_target2_y,
    effective_target3_valid, effective_target3_x, effective_target3_y);
  const auto &zone_evidence = id(radar_api).software_zone_evidence();
  record_software_zone_transitions(1, effective_target1_valid ? zone_evidence.target_software_masks[0] : 0);
  record_software_zone_transitions(2, effective_target2_valid ? zone_evidence.target_software_masks[1] : 0);
  record_software_zone_transitions(3, effective_target3_valid ? zone_evidence.target_software_masks[2] : 0);
  id(software_zone_configured_state) = zone_evidence.configured;
  id(software_detection_zone_count_state) = zone_evidence.detection_zone_count;
  id(software_filter_zone_count_state) = zone_evidence.filter_zone_count;
  id(software_zone_1_target_count_state) = zone_evidence.detection_zone_counts[0];
  id(software_zone_2_target_count_state) = zone_evidence.detection_zone_counts[1];
  id(software_zone_3_target_count_state) = zone_evidence.detection_zone_counts[2];
  id(software_zone_4_target_count_state) = zone_evidence.detection_zone_counts[3];
  id(software_zone_5_target_count_state) = zone_evidence.detection_zone_counts[4];
  id(software_zone_6_target_count_state) = zone_evidence.detection_zone_counts[5];
  id(software_zone_1_presence_state) = zone_evidence.detection_zone_counts[0] > 0;
  id(software_zone_2_presence_state) = zone_evidence.detection_zone_counts[1] > 0;
  id(software_zone_3_presence_state) = zone_evidence.detection_zone_counts[2] > 0;
  id(software_zone_4_presence_state) = zone_evidence.detection_zone_counts[3] > 0;
  id(software_zone_5_presence_state) = zone_evidence.detection_zone_counts[4] > 0;
  id(software_zone_6_presence_state) = zone_evidence.detection_zone_counts[5] > 0;
  esphome::radar_api_server::DeviceStateJsonInput state_json_input;
  state_json_input.now_ms = now;
  state_json_input.pir_motion = id(pir_motion).state;
  state_json_input.pir_motion_effective = state_pir_motion_effective;
  state_json_input.filter_blocked = state_filter_blocked;
  state_json_input.presence = id(state_presence_stable);
  state_json_input.motion = id(state_motion_stable);
  state_json_input.target_count = tracker_primary_enabled ? state_target_count_effective : id(cnt_stable_total);
  state_json_input.moving_target_count = state_moving_target_count_effective;
  state_json_input.still_target_count = state_still_target_count_effective;
  state_json_input.temperature_c = id(temperature_corrected).state;
  state_json_input.humidity_percent = id(humidity_corrected).state;
  state_json_input.illuminance_lux = id(illuminance_lux).state;
  state_json_input.presence_reason = id(diag_last_presence_reason).c_str();
  state_json_input.presence_off_reason = id(diag_last_presence_off_reason).c_str();
  state_json_input.motion_reason = id(diag_last_motion_reason).c_str();
  state_json_input.last_presence_drop_ms = id(diag_last_presence_drop_ms);
  state_json_input.has_last_valid_target_age = id(diag_last_valid_target_ms) != 0;
  state_json_input.last_valid_target_age_ms =
    state_json_input.has_last_valid_target_age ? now - id(diag_last_valid_target_ms) : 0;
  state_json_input.empty_samples_consecutive = id(diag_empty_samples_consecutive);
  state_json_input.short_presence_drop_count = id(diag_short_presence_drop_count);
  state_json_input.long_presence_drop_count = id(diag_long_presence_drop_count);
  state_json_input.still_state = id(diag_still_state).c_str();
  state_json_input.still_reason = id(diag_still_reason).c_str();
  state_json_input.still_confidence = id(diag_still_confidence);
  state_json_input.still_hold_active = state_still_hold_active;
  state_json_input.has_still_last_seen_age = id(diag_still_last_seen_ms) != 0;
  state_json_input.still_last_seen_age_ms =
    state_json_input.has_still_last_seen_age ? now - id(diag_still_last_seen_ms) : 0;
  state_json_input.still_anchor_valid = id(diag_still_anchor_valid);
  state_json_input.still_anchor_x = id(diag_still_anchor_x);
  state_json_input.still_anchor_y = id(diag_still_anchor_y);
  state_json_input.range_reason = id(diag_range_reason).c_str();
  state_json_input.range_suspect_count = id(diag_range_suspect_count);
  state_json_input.range_out_of_range_count = id(diag_range_out_of_range_count);
  state_json_input.range_remote_candidate_count = id(diag_range_remote_candidate_count);
  state_json_input.targets[0] = {"target_1", "T1", "#ff6b7a", effective_target1_x, effective_target1_y, effective_target1_valid};
  state_json_input.targets[1] = {"target_2", "T2", "#ffd166", effective_target2_x, effective_target2_y, effective_target2_valid};
  state_json_input.targets[2] = {"target_3", "T3", "#06d6a0", effective_target3_x, effective_target3_y, effective_target3_valid};
  id(radar_api).update_device_state_json(state_json_input);
  id(radar_api).update_diagnostic_snapshot(
    id(state_presence_stable), id(state_motion_stable), id(pir_motion).state,
    state_target_count_effective, state_moving_target_count_effective, state_still_target_count_effective,
    id(diag_still_confidence), state_still_hold_active, id(diag_empty_samples_consecutive),
    id(diag_range_suspect_count), id(diag_range_out_of_range_count), id(diag_range_remote_candidate_count),
    id(illuminance_lux).state, id(diag_last_presence_reason).c_str(),
    id(diag_last_presence_off_reason).c_str(), id(diag_last_motion_reason).c_str(),
    id(diag_still_state).c_str(), id(diag_still_reason).c_str(), id(diag_range_reason).c_str(),
    zone_evidence.exit_zone_active, zone_evidence.exit_zone_mask, zone_evidence.exit_target_count,
    zone_evidence.exit_last_seen_age_ms);
  
  // === 섹션 5: 일별 통계 롤오버 및 저장 ===
  // SNTP 날짜 기준으로 오늘 통계를 갱신하고, 날짜가 바뀌면 전날 통계를 저장한 뒤 오늘 값을 초기화한다.
  // 평소 프레임에서는 메모리의 today JSON만 갱신하고, flash 쓰기는 day_key 변경 시에만 수행한다.
  auto reset_today_stats = [&]() {
    id(today_calibration_filter_hits) = 0;
    id(today_calibration_reduced_hits) = 0;
    id(today_calibration_filter_zone_1_hits) = 0;
    id(today_calibration_filter_zone_2_hits) = 0;
    id(today_calibration_filter_zone_3_hits) = 0;
    id(today_calibration_filter_zone_4_hits) = 0;
    id(today_calibration_reduced_zone_1_hits) = 0;
    id(today_calibration_reduced_zone_2_hits) = 0;
    id(today_calibration_reduced_zone_3_hits) = 0;
    id(today_calibration_reduced_zone_4_hits) = 0;
    id(today_software_zone_1_hits) = 0;
    id(today_software_zone_2_hits) = 0;
    id(today_software_zone_3_hits) = 0;
    id(today_software_zone_4_hits) = 0;
    id(today_software_zone_5_hits) = 0;
    id(today_software_zone_6_hits) = 0;
    id(target_1_software_zone_mask) = 0;
    id(target_2_software_zone_mask) = 0;
    id(target_3_software_zone_mask) = 0;
  };
  
  auto compact_day_stats_json = [&](int day_key) -> std::string {
    std::string json = "{\"d\":";
    json += std::to_string(day_key);
    json += ",\"f\":";
    json += std::to_string(id(today_calibration_filter_hits));
    json += ",\"r\":";
    json += std::to_string(id(today_calibration_reduced_hits));
    json += ",\"fz\":[";
    json += std::to_string(id(today_calibration_filter_zone_1_hits)) + ",";
    json += std::to_string(id(today_calibration_filter_zone_2_hits)) + ",";
    json += std::to_string(id(today_calibration_filter_zone_3_hits)) + ",";
    json += std::to_string(id(today_calibration_filter_zone_4_hits));
    json += "],\"rz\":[";
    json += std::to_string(id(today_calibration_reduced_zone_1_hits)) + ",";
    json += std::to_string(id(today_calibration_reduced_zone_2_hits)) + ",";
    json += std::to_string(id(today_calibration_reduced_zone_3_hits)) + ",";
    json += std::to_string(id(today_calibration_reduced_zone_4_hits));
    json += "],\"sz\":[";
    json += std::to_string(id(today_software_zone_1_hits)) + ",";
    json += std::to_string(id(today_software_zone_2_hits)) + ",";
    json += std::to_string(id(today_software_zone_3_hits)) + ",";
    json += std::to_string(id(today_software_zone_4_hits)) + ",";
    json += std::to_string(id(today_software_zone_5_hits)) + ",";
    json += std::to_string(id(today_software_zone_6_hits));
    json += "]}";
    return json;
  };

  // Timezone changes run in this loop so the RTC, RAM counters, and stored
  // current-day payload move together. Completed daily history is preserved.
  std::string requested_timezone;
  const bool timezone_change_requested = id(radar_api).take_timezone_request(&requested_timezone);
  if (timezone_change_requested) {
    auto timezone_call = id(device_timezone).make_call();
    timezone_call.set_option(requested_timezone);
    timezone_call.perform();
  }

  const std::string active_timezone = id(device_timezone).current_option().str();
  if (!active_timezone.empty() && active_timezone != id(timezone_applied_id)) {
    const char *posix_timezone = esphome::radar_api_server::timezone_posix(active_timezone.c_str());
    if (posix_timezone != nullptr) {
      id(sntp_time).set_timezone(posix_timezone);
      id(timezone_applied_id) = active_timezone;
    }
  }

  auto time_now = id(sntp_time).now();
  if (timezone_change_requested) {
    reset_today_stats();
    const int reset_day_key = time_now.is_valid()
                                  ? time_now.year * 10000 + time_now.month * 100 + time_now.day_of_month
                                  : 0;
    id(stats_current_day_key) = reset_day_key;
    id(heatmap_last_record_ms) = 0;
    const std::string reset_today_json = compact_day_stats_json(reset_day_key);
    if (!id(radar_api).reset_today_stats(reset_today_json)) {
      ESP_LOGE("stats", "Failed to persist current-day reset after timezone change");
    }
  } else if (time_now.is_valid()) {
    const int day_key = time_now.year * 10000 + time_now.month * 100 + time_now.day_of_month;
    if (id(stats_current_day_key) == 0) {
      id(stats_current_day_key) = day_key;
      id(radar_api).update_today_stats_json(compact_day_stats_json(day_key));
    } else if (day_key != id(stats_current_day_key)) {
      const std::string finished_day_json = compact_day_stats_json(id(stats_current_day_key));
      reset_today_stats();
      id(stats_current_day_key) = day_key;
      const std::string new_today_json = compact_day_stats_json(day_key);
      // save_finished_stats_day는 flash에 쓰며 radar_storage의 write_payload 경로를 탄다.
      // 이 저장은 자정 롤오버(day_key 변경) 시에만 실행되는 현 구조를 유지해야 한다.
      // 매 프레임 호출로 바꾸면 진행 중인 청크 업로드와 저장 경합이 발생할 수 있다.
      id(radar_api).save_finished_stats_day(finished_day_json, new_today_json);
    } else {
      id(radar_api).update_today_stats_json(compact_day_stats_json(day_key));
    }
  }
  
  // === 섹션 6: target 1/2/3 방향 상태 머신 ===
  // 타깃 수를 안정화하고 각 타깃의 접근/멀어짐/정지 방향 상태를 히스테리시스로 확정한다.
  // 저속은 정지로 간주하고, 타깃이 사라진 뒤에는 timeout 이후 방향 상태를 정지로 되돌린다.
  const bool has_target = id(ld2450_has_target).state;
  bool target_valid = false;
  
  // Clear counts immediately when the radar has no target.
  if (!has_target) {
    id(cnt_stable_total) = 0;
    id(cnt_last_nonzero_ms) = 0;
  } else {
    int raw_total = 0;
    if (target1_valid) raw_total++;
    if (target2_valid) raw_total++;
    if (target3_valid) raw_total++;
    target_valid = raw_total > 0;
  
    // Stable target count: clamp to 0..3 and delay only zero transition.
    if (raw_total > 0) {
      id(cnt_stable_total) = raw_total;
      id(cnt_last_nonzero_ms) = now;
    } else if ((now - id(cnt_last_nonzero_ms)) >= (uint32_t) id(cnt_zero_hold_ms)) {
      id(cnt_stable_total) = 0;
    }
  
    if (target1_valid) {
      id(dir_last_seen_ms) = now;
    }
  
    if ((now - id(dir_last_seen_ms)) > (uint32_t) id(dir_target_lost_timeout_ms)) {
      id(dir_stable_value) = "Stationary";
      id(dir_consecutive_count) = 0;
      id(dir_last_observed) = "Stationary";
    } else if (!isnan(id(target_1_speed_raw).state)) {
      const float speed_abs = fabsf(id(target_1_speed_raw).state);
      std::string observed = "Stationary";
      const std::string raw = id(target_1_direction_raw).state;
  
      if (speed_abs <= id(dir_stationary_speed)) {
        // Low speed is treated as stationary.
        observed = "Stationary";
      } else {
        // Use raw direction for medium and high speed targets.
        if (raw == "Approaching") {
          observed = "Approaching";
        } else if (raw == "Moving away") {
          observed = "Moving Away";
        } else {
          observed = "Stationary";
        }
      }
  
      // 노이즈로 인한 방향 깜빡임을 막기 위한 히스테리시스.
      // 방향은 N번 연속 동일 관측이어야 확정되며, 즉시 반영하면 값이 튄다.
      if (observed == id(dir_last_observed)) {
        id(dir_consecutive_count) = id(dir_consecutive_count) + 1;
        if (id(dir_consecutive_count) >= id(dir_consecutive_need)) {
          id(dir_stable_value) = observed;
        }
      } else {
        id(dir_last_observed) = observed;
        id(dir_consecutive_count) = 1;
      }
    }
  
    // Target-2 direction state machine
    if (target2_valid) {
      id(dir2_last_seen_ms) = now;
    }
  
    if ((now - id(dir2_last_seen_ms)) > (uint32_t) id(dir_target_lost_timeout_ms)) {
      id(dir2_stable_value) = "Stationary";
      id(dir2_consecutive_count) = 0;
      id(dir2_last_observed) = "Stationary";
    } else if (!isnan(id(target_2_speed_raw).state)) {
      const float speed2_abs = fabsf(id(target_2_speed_raw).state);
      std::string observed2 = "Stationary";
      const std::string raw2 = id(target_2_direction_raw).state;
  
      if (speed2_abs <= id(dir_stationary_speed)) {
        observed2 = "Stationary";
      } else {
        if (raw2 == "Approaching") {
          observed2 = "Approaching";
        } else if (raw2 == "Moving away") {
          observed2 = "Moving Away";
        } else {
          observed2 = "Stationary";
        }
      }
  
      // Change direction only after enough consecutive samples.
      if (observed2 == id(dir2_last_observed)) {
        id(dir2_consecutive_count) = id(dir2_consecutive_count) + 1;
        if (id(dir2_consecutive_count) >= id(dir_consecutive_need)) {
          id(dir2_stable_value) = observed2;
        }
      } else {
        id(dir2_last_observed) = observed2;
        id(dir2_consecutive_count) = 1;
      }
    }
  
    // Target-3 direction state machine
    if (target3_valid) {
      id(dir3_last_seen_ms) = now;
    }
  
    if ((now - id(dir3_last_seen_ms)) > (uint32_t) id(dir_target_lost_timeout_ms)) {
      id(dir3_stable_value) = "Stationary";
      id(dir3_consecutive_count) = 0;
      id(dir3_last_observed) = "Stationary";
    } else if (!isnan(id(target_3_speed_raw).state)) {
      const float speed3_abs = fabsf(id(target_3_speed_raw).state);
      std::string observed3 = "Stationary";
      const std::string raw3 = id(target_3_direction_raw).state;
  
      if (speed3_abs <= id(dir_stationary_speed)) {
        observed3 = "Stationary";
      } else {
        if (raw3 == "Approaching") {
          observed3 = "Approaching";
        } else if (raw3 == "Moving away") {
          observed3 = "Moving Away";
        } else {
          observed3 = "Stationary";
        }
      }
  
      // Change direction only after enough consecutive samples.
      if (observed3 == id(dir3_last_observed)) {
        id(dir3_consecutive_count) = id(dir3_consecutive_count) + 1;
        if (id(dir3_consecutive_count) >= id(dir_consecutive_need)) {
          id(dir3_stable_value) = observed3;
        }
      } else {
        id(dir3_last_observed) = observed3;
        id(dir3_consecutive_count) = 1;
      }
    }
  }
  
  // === 섹션 7: 제어 요청 반영 및 LED 자동 제어 ===
  // 웹 대시보드에서 들어온 상태 LED, 보정, 온습도 오프셋 요청을 ESPHome 컴포넌트에 반영한다.
  // 이후 현재 제어 상태를 API에 갱신하고, 재실 상태에 따라 상태 LED 점멸을 자동 제어한다.
  bool requested_status_led_enabled = false;
  if (id(radar_api).take_status_led_request(&requested_status_led_enabled)) {
    if (requested_status_led_enabled) {
      id(status_led_enable_switch).turn_on();
    } else {
      id(status_led_enable_switch).turn_off();
    }
  }

  float requested_led_blink_duration = 0.0f;
  if (id(radar_api).take_led_blink_duration_request(&requested_led_blink_duration)) {
    auto duration_call = id(led_blink_duration).make_call();
    duration_call.set_value(requested_led_blink_duration);
    duration_call.perform();
  }

  bool requested_environment_correction_enabled = false;
  if (id(radar_api).take_environment_correction_request(&requested_environment_correction_enabled)) {
    if (requested_environment_correction_enabled) {
      id(environment_correction_enable_switch).turn_on();
    } else {
      id(environment_correction_enable_switch).turn_off();
    }
  }

  float requested_temperature_offset = 0.0f;
  if (id(radar_api).take_temperature_offset_request(&requested_temperature_offset)) {
    auto temperature_offset_call = id(temperature_user_offset).make_call();
    temperature_offset_call.set_value(requested_temperature_offset);
    temperature_offset_call.perform();
  }

  float requested_humidity_offset = 0.0f;
  if (id(radar_api).take_humidity_offset_request(&requested_humidity_offset)) {
    auto humidity_offset_call = id(humidity_user_offset).make_call();
    humidity_offset_call.set_value(requested_humidity_offset);
    humidity_offset_call.perform();
  }

  id(radar_api).update_control_status(
      id(led_enabled),
      id(led_blink_duration).state,
      id(environment_correction_enable_switch).state,
      id(temperature_user_offset).state,
      id(humidity_user_offset).state,
      id(device_timezone).current_option().str());

  // LED auto control logic
  const bool presence = id(presence_combined).state;
  const bool led_is_enabled = id(led_enabled);
  const float duration_s = id(led_blink_duration).state;
  const bool presence_started = presence && !id(led_last_presence);
  
  if (presence && led_is_enabled) {
    if (duration_s < 1.0f && id(led_auto_finished)) {
      id(led_auto_finished) = false;
    }
  
    if (!id(led_auto_finished) && (presence_started || id(led_blink_end_ms) == 0)) {
      if (duration_s < 1.0f) {
        id(led_blink_end_ms) = UINT32_MAX;
      } else {
        id(led_blink_end_ms) = now + ((uint32_t)(duration_s * 1000.0f));
      }
      id(led_last_toggle_ms) = now;
      id(led_blink_state) = true;
      id(status_led).turn_on().perform();
    }
  
    if (id(led_blink_end_ms) == UINT32_MAX || now < id(led_blink_end_ms)) {
      if ((now - id(led_last_toggle_ms)) >= 3000) {
        id(led_blink_state) = !id(led_blink_state);
        id(led_last_toggle_ms) = now;
        if (id(led_blink_state)) {
          id(status_led).turn_on().perform();
        } else {
          id(status_led).turn_off().perform();
        }
      }
    } else if (id(led_blink_end_ms) != 0) {
      id(led_blink_end_ms) = 0;
      id(led_blink_state) = false;
      id(led_auto_finished) = true;
      id(status_led).turn_off().perform();
    }
  } else {
    id(led_blink_end_ms) = 0;
    id(led_blink_state) = false;
    id(led_auto_finished) = false;
    id(status_led).turn_off().perform();
  }
  
  id(led_last_presence) = presence;
  
