sensor:
  - platform: sht4x
    temperature:
      id: temperature_raw
      internal: true
    humidity:
      id: humidity_raw
      internal: true
    address: 0x44
    update_interval: 30s
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Target Count Raw"
      id: ld2450_target_count
      entity_category: diagnostic
      disabled_by_default: true
      filters:
        - throttle: 2s
    still_target_count:
      name: "Still Target Count Raw"
      id: ld2450_still_target_count
      entity_category: diagnostic
      disabled_by_default: true
      filters:
        - throttle: 2s
    moving_target_count:
      name: "Moving Target Count Raw"
      id: ld2450_moving_target_count
      entity_category: diagnostic
      disabled_by_default: true
      filters:
        - throttle: 2s
    target_1:
      x:
        id: target_1_x_raw
        internal: true
        filters:
          - throttle: 2s
      y:
        id: target_1_y_raw
        internal: true
        filters:
          - throttle: 2s
      speed:
        id: target_1_speed_raw
        internal: true
        filters:
          - throttle: 2s
      angle:
        id: target_1_angle_raw
        internal: true
        filters:
          - throttle: 2s
      distance:
        id: target_1_distance_raw
        internal: true
        filters:
          - throttle: 2s
    target_2:
      x:
        id: target_2_x_raw
        internal: true
        filters:
          - throttle: 2s
      y:
        id: target_2_y_raw
        internal: true
        filters:
          - throttle: 2s
      speed:
        id: target_2_speed_raw
        internal: true
        filters:
          - throttle: 2s
      angle:
        id: target_2_angle_raw
        internal: true
        filters:
          - throttle: 2s
      distance:
        id: target_2_distance_raw
        internal: true
        filters:
          - throttle: 2s
    target_3:
      x:
        id: target_3_x_raw
        internal: true
        filters:
          - throttle: 2s
      y:
        id: target_3_y_raw
        internal: true
        filters:
          - throttle: 2s
      speed:
        id: target_3_speed_raw
        internal: true
        filters:
          - throttle: 2s
      angle:
        id: target_3_angle_raw
        internal: true
        filters:
          - throttle: 2s
      distance:
        id: target_3_distance_raw
        internal: true
        filters:
          - throttle: 2s
    zone_1:
      target_count:
        name: "Zone 1 Target Count Raw"
        id: zone_1_target_count
        entity_category: diagnostic
        disabled_by_default: true
        filters:
          - throttle: 2s
    zone_2:
      target_count:
        name: "Zone 2 Target Count Raw"
        id: zone_2_target_count
        entity_category: diagnostic
        disabled_by_default: true
        filters:
          - throttle: 2s
    zone_3:
      target_count:
        name: "Zone 3 Target Count Raw"
        id: zone_3_target_count
        entity_category: diagnostic
        disabled_by_default: true
        filters:
          - throttle: 2s
  - platform: template
    name: "Still Target Count"
    id: still_target_count_filtered
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        if (id(target_1_filter_blocked) || id(target_2_filter_blocked) || id(target_3_filter_blocked)) return 0;
        return id(radar_api).tracker_output().still_track_count;
      }
      int count = 0;
      if (id(target_1_direction_raw).state != "NA" && !id(target_1_filtered) && id(target_1_range_valid) && fabsf(id(target_1_speed_raw).state) <= id(dir_stationary_speed)) count++;
      if (id(target_2_direction_raw).state != "NA" && !id(target_2_filtered) && id(target_2_range_valid) && fabsf(id(target_2_speed_raw).state) <= id(dir_stationary_speed)) count++;
      if (id(target_3_direction_raw).state != "NA" && !id(target_3_filtered) && id(target_3_range_valid) && fabsf(id(target_3_speed_raw).state) <= id(dir_stationary_speed)) count++;
      return count;
  - platform: template
    name: "Moving Target Count"
    id: moving_target_count_filtered
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        if (id(target_1_filter_blocked) || id(target_2_filter_blocked) || id(target_3_filter_blocked)) return 0;
        return id(radar_api).tracker_output().moving_track_count;
      }
      int count = 0;
      if (id(target_1_direction_raw).state != "NA" && !id(target_1_filtered) && id(target_1_range_valid) && fabsf(id(target_1_speed_raw).state) > id(dir_stationary_speed)) count++;
      if (id(target_2_direction_raw).state != "NA" && !id(target_2_filtered) && id(target_2_range_valid) && fabsf(id(target_2_speed_raw).state) > id(dir_stationary_speed)) count++;
      if (id(target_3_direction_raw).state != "NA" && !id(target_3_filtered) && id(target_3_range_valid) && fabsf(id(target_3_speed_raw).state) > id(dir_stationary_speed)) count++;
      return count;
  - platform: template
    name: "Detection Zone Count"
    id: detection_zone_count
    entity_category: diagnostic
    update_interval: 5s
    accuracy_decimals: 0
    disabled_by_default: true
    lambda: |-
      return id(software_detection_zone_count_state);
  - platform: template
    name: "Filter Zone Count"
    id: filter_zone_count
    entity_category: diagnostic
    update_interval: 5s
    accuracy_decimals: 0
    disabled_by_default: false
    lambda: |-
      return id(software_filter_zone_count_state);
  - platform: template
    name: "Presence Debug Last Target Age"
    id: presence_debug_last_target_age
    entity_category: diagnostic
    unit_of_measurement: "s"
    update_interval: 2s
    accuracy_decimals: 1
    disabled_by_default: false
    lambda: |-
      const uint32_t now = millis();
      if (id(diag_last_valid_target_ms) == 0) return NAN;
      return (now - id(diag_last_valid_target_ms)) / 1000.0f;
  - platform: template
    name: "Presence Debug Empty Samples"
    id: presence_debug_empty_samples
    entity_category: diagnostic
    update_interval: 2s
    accuracy_decimals: 0
    disabled_by_default: false
    lambda: |-
      return id(diag_empty_samples_consecutive);
  - platform: template
    name: "Presence Debug Last Drop"
    id: presence_debug_last_drop
    entity_category: diagnostic
    unit_of_measurement: "s"
    update_interval: 2s
    accuracy_decimals: 1
    disabled_by_default: false
    lambda: |-
      return id(diag_last_presence_drop_ms) / 1000.0f;
  - platform: template
    name: "Presence Debug Short Drops"
    id: presence_debug_short_drops
    entity_category: diagnostic
    update_interval: 10s
    accuracy_decimals: 0
    disabled_by_default: false
    lambda: |-
      return id(diag_short_presence_drop_count);
  - platform: template
    name: "Presence Debug Long Drops"
    id: presence_debug_long_drops
    entity_category: diagnostic
    update_interval: 10s
    accuracy_decimals: 0
    disabled_by_default: false
    lambda: |-
      return id(diag_long_presence_drop_count);
  - platform: template
    name: "Still Debug Confidence"
    id: still_debug_confidence
    entity_category: diagnostic
    update_interval: 2s
    accuracy_decimals: 0
    disabled_by_default: false
    lambda: |-
      return id(diag_still_confidence);
  - platform: template
    id: target_1_x_display
    entity_category: diagnostic
    name: "Target 1 X"
    unit_of_measurement: "mm"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        const auto &track = id(radar_api).tracker_output().tracks[0];
        return track.valid ? track.x_mm : 0;
      }
      if (id(target_1_direction_raw).state == "NA" || id(target_1_filtered) || !id(target_1_range_valid)) {
        return 0;
      }
      return id(target_1_x_raw).state;
  - platform: template
    id: target_1_y_display
    entity_category: diagnostic
    name: "Target 1 Y"
    unit_of_measurement: "mm"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        const auto &track = id(radar_api).tracker_output().tracks[0];
        return track.valid ? track.y_mm : 0;
      }
      if (id(target_1_direction_raw).state == "NA" || id(target_1_filtered) || !id(target_1_range_valid)) {
        return 0;
      }
      return id(target_1_y_raw).state;
  - platform: template
    id: target_1_speed_display
    entity_category: diagnostic
    name: "Target 1 Speed"
    unit_of_measurement: "cm/s"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        const auto &track = id(radar_api).tracker_output().tracks[0];
        return track.valid ? track.speed_cm_s : 0;
      }
      if (id(target_1_direction_raw).state == "NA" || id(target_1_filtered) || !id(target_1_range_valid)) {
        return 0;
      }
      return id(target_1_speed_raw).state;
  - platform: template
    id: target_1_angle_display
    entity_category: diagnostic
    name: "Target 1 Angle"
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        const auto &track = id(radar_api).tracker_output().tracks[0];
        if (!track.valid) return 0;
        constexpr float radians_to_degrees = 57.295779513f;
        return atan2f(track.x_mm, track.y_mm) * radians_to_degrees;
      }
      if (id(target_1_direction_raw).state == "NA" || id(target_1_filtered) || !id(target_1_range_valid)) {
        return 0;
      }
      return id(target_1_angle_raw).state;
  - platform: template
    id: target_1_distance_display
    entity_category: diagnostic
    name: "Target 1 Distance"
    unit_of_measurement: "mm"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      if (id(radar_api).tracker_assist_presence_enabled()) {
        const auto &track = id(radar_api).tracker_output().tracks[0];
        return track.valid ? track.distance_mm : 0;
      }
      if (id(target_1_direction_raw).state == "NA" || id(target_1_filtered) || !id(target_1_range_valid)) {
        return 0;
      }
      return id(target_1_distance_raw).state;

