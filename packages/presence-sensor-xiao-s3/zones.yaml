binary_sensor:
  - platform: template
    name: "Zones Configured"
    id: custom_zone_configured
    lambda: |-
      return id(software_zone_configured_state);

  # Factory reset button

sensor:
  - platform: template
    name: "Zone 1 Target Count"
    id: software_zone_1_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      return id(software_zone_1_target_count_state);
  - platform: template
    name: "Zone 2 Target Count"
    id: software_zone_2_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      return id(software_zone_2_target_count_state);
  - platform: template
    name: "Zone 3 Target Count"
    id: software_zone_3_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: |-
      return id(software_zone_3_target_count_state);
  - platform: template
    name: "Zone 4 Target Count"
    id: software_zone_4_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    disabled_by_default: true
    lambda: |-
      return id(software_zone_4_target_count_state);
  - platform: template
    name: "Zone 5 Target Count"
    id: software_zone_5_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    disabled_by_default: true
    lambda: |-
      return id(software_zone_5_target_count_state);
  - platform: template
    name: "Zone 6 Target Count"
    id: software_zone_6_target_count
    entity_category: diagnostic
    update_interval: 500ms
    accuracy_decimals: 0
    disabled_by_default: true
    lambda: |-
      return id(software_zone_6_target_count_state);

  # HA-facing target 1 values with ghost-data cleanup

text:
  - platform: template
    name: "Zone 1 Name"
    id: zone_1_name
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "Zone 1"
    min_length: 0
    max_length: 32
    mode: text
  - platform: template
    name: "Zone 2 Name"
    id: zone_2_name
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "Zone 2"
    min_length: 0
    max_length: 32
    mode: text
  - platform: template
    name: "Zone 3 Name"
    id: zone_3_name
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "Zone 3"
    min_length: 0
    max_length: 32
    mode: text

text_sensor:
  - platform: template
    name: "Zone Summary"
    id: zone_summary
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      return std::string("Detection ") + std::to_string(id(software_detection_zone_count_state)) + " / Filter " + std::to_string(id(software_filter_zone_count_state));
